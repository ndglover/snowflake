# !!!! AUTO-GENERATED FILE.  DO NOT EDIT. !!!!
# USE adbc-gen-workflow (see adbc-drivers/dev) TO UPDATE THIS FILE.

# This is a common workflow for building & testing drivers:
#
# - Build the driver
# - Start dependencies
# - Run tests
# - Build the shared library

name: Go Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "go/**"
      - .github/workflows/go_test.yaml
  push:
    branches:
      - main
    paths:
      - "go/**"
      - .github/workflows/go_test.yaml

  workflow_call:
    inputs:
      repository:
        description: "The repository to checkout (in owner/repo short format)"
        required: true
        type: string
      ref:
        description: "The ref to checkout"
        required: true
        type: string
    secrets:
      SNOWFLAKE_DATABASE:
        required: true
      SNOWFLAKE_SCHEMA:
        required: true
      SNOWFLAKE_URI:
        required: true
      SNOWFLAKE_SCHEMA_SECONDARY:
        required: true
      SNOWFLAKE_DATABASE_SECONDARY:
        required: true
      SNOWFLAKE_DATABASE_SECONDARY_SCHEMA:
        required: true

concurrency:
  # Must share concurrency group with release workflow since it also builds/tests
  group: ${{ github.repository }}-${{ github.ref }}-Snowflake-CI
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test:
    name: "Test/${{ matrix.platform }}_${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
          - { platform: macos, arch: arm64, runner: macos-latest }
          - { platform: windows, arch: amd64, runner: windows-latest }
    environment: Snowflake CI
    permissions:
      contents: read
    steps:
      - name: free up disk space
        if: runner.os != 'Windows'
        run: |
          # Preinstalled tools use a lot of disk space, free up some space
          # https://github.com/actions/runner-images/issues/2840
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - name: "checkout remote"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name == 'workflow_dispatch'
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: true
          cache-dependency-path: go/go.sum
          check-latest: true
          go-version-file: go/go.mod

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.63.2
          run-install: false


      - name: Build
        working-directory: go
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            echo "Loading pre-build"
            ./ci/scripts/pre-build.sh test ${{ matrix.platform }} ${{ matrix.arch }}
          fi

          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          set +a

          go build ./...

      - name: Start Test Dependencies
        # Can't use Docker on macOS AArch64 runners, and Windows containers
        # work but often the container doesn't support Windows
        if: runner.os == 'Linux'
        working-directory: go
        run: |
          if [[ -f compose.yaml ]]; then
            if ! docker compose up --detach --wait test-service; then
              echo "Service failed to start"
              echo "Logs:"
              docker compose logs test-service
              exit 1
            fi
          fi

      - name: Test
        working-directory: go
        run: |
          set -a
          if [[ -f .env ]]; then
            source .env
          fi
          if [[ -f .env.${{ matrix.platform }} ]]; then
            source .env.${{ matrix.platform }}
          fi
          if [[ -f .env.ci ]]; then
            source .env.ci
          fi
          set +a

          if [[ -f ci/scripts/pre-test.sh ]]; then
            echo "Loading pre-test"
            ./ci/scripts/pre-test.sh ${{ matrix.platform }} ${{ matrix.arch }}
          fi

          go test -tags assert -v ./...

          if [[ -f ci/scripts/post-test.sh ]]; then
            ./ci/scripts/post-test.sh
          fi

      - name: go mod tidy
        if: runner.os == 'Linux'
        working-directory: go
        run: |
          go mod tidy --diff

  validate:
    name: "Validate snowflake ${{ matrix.vendor_version }}/${{ matrix.platform }}_${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # I think we only need to test one platform, but we can change that later
          - { platform: linux, arch: amd64, runner: ubuntu-latest, service_name: "test-service", vendor_version: "latest" }
    environment: Snowflake CI
    permissions:
      contents: read
    steps:
      - name: free up disk space
        if: runner.os != 'Windows'
        run: |
          # Preinstalled tools use a lot of disk space, free up some space
          # https://github.com/actions/runner-images/issues/2840
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - name: "checkout remote"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name == 'workflow_dispatch'
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: true
          cache-dependency-path: go/go.sum
          check-latest: true
          go-version-file: go/go.mod

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.63.2
          run-install: false


      - name: Log in to ghcr.io
        if: runner.os == 'Linux'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build Library
        working-directory: go
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            ./ci/scripts/pre-build.sh test ${{ matrix.platform }} ${{ matrix.arch }}
          fi
          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          if [[ -f .env.test ]]; then
            source .env.test
          fi
          set +a
          pixi run adbc-make build DEBUG=true VERBOSE=true DRIVER=snowflake IMPL_LANG=go BUILD_TAGS=minicore_disabled
      - name: Start Test Dependencies
        # Can't use Docker on macOS AArch64 runners, and Windows containers
        # work but often the container doesn't support Windows
        if: runner.os == 'Linux'
        working-directory: go
        run: |
          if [[ -f compose.yaml ]]; then
            if ! docker compose up --detach --wait ${{ matrix.service_name }}; then
              echo "Service failed to start"
              echo "Logs:"
              docker compose logs ${{ matrix.service_name }}
              exit 1
            fi
          fi

      - name: Validate
        if: runner.os == 'Linux'
        env:
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }} # zizmor: ignore[secrets-outside-env]
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }} # zizmor: ignore[secrets-outside-env]
          SNOWFLAKE_URI: ${{ secrets.SNOWFLAKE_URI }} # zizmor: ignore[secrets-outside-env]
          SNOWFLAKE_SCHEMA_SECONDARY: ${{ secrets.SNOWFLAKE_SCHEMA_SECONDARY }} # zizmor: ignore[secrets-outside-env]
          SNOWFLAKE_DATABASE_SECONDARY: ${{ secrets.SNOWFLAKE_DATABASE_SECONDARY }} # zizmor: ignore[secrets-outside-env]
          SNOWFLAKE_DATABASE_SECONDARY_SCHEMA: ${{ secrets.SNOWFLAKE_DATABASE_SECONDARY_SCHEMA }} # zizmor: ignore[secrets-outside-env]
        working-directory: go
        run: |
          set -a
          if [[ -f .env ]]; then
            source .env
          fi
          if [[ -f .env.${{ matrix.platform }} ]]; then
            source .env.${{ matrix.platform }}
          fi
          if [[ -f .env.ci ]]; then
            source .env.ci
          fi
          set +a

          if [[ -f ci/scripts/pre-test.sh ]]; then
            echo "Loading pre-test"
            ./ci/scripts/pre-test.sh ${{ matrix.platform }} ${{ matrix.arch }} ${{ matrix.service_name }}
          fi

          docker ps
          if [[ -n "${{ matrix.vendor_version }}" ]]; then
            pixi run validate --vendor-version "${{ matrix.vendor_version }}"
          else
            pixi run validate
          fi

          if [[ -f ci/scripts/post-test.sh ]]; then
            ./ci/scripts/post-test.sh
          fi

          cp validation-report.xml validation-report-${{ matrix.vendor_version }}.xml

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: validation-report-${{ matrix.vendor_version }}
          path: "go/validation-report-${{ matrix.vendor_version }}.xml"
          retention-days: 7

      - name: Generate docs
        working-directory: go
        run: |
          pixi run gendocs --output generated

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: docs-${{ matrix.vendor_version }}
          path: "go/generated/snowflake.md"
          retention-days: 7

  build:
    name: "Build snowflake/${{ matrix.platform }}_${{ matrix.arch }}"
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
          - { platform: linux, arch: arm64, runner: ubuntu-24.04-arm }
          - { platform: macos, arch: arm64, runner: macos-latest }
          - { platform: windows, arch: amd64, runner: windows-latest }
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - name: "checkout remote"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name == 'workflow_dispatch'
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: true
          cache-dependency-path: go/go.sum
          check-latest: true
          go-version-file: go/go.mod

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.63.2
          run-install: false

      - name: Install dev tools
        working-directory: go
        run: |
          pixi install

      - name: Log in to ghcr.io
        if: runner.os == 'Linux'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build Library
        working-directory: go
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            ./ci/scripts/pre-build.sh release ${{ matrix.platform }} ${{ matrix.arch }}
          fi
          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          if [[ -f .env.release ]]; then
            source .env.release
          fi
          set +a
          pixi run adbc-make check CI=true VERBOSE=true DRIVER=snowflake IMPL_LANG=go BUILD_TAGS=minicore_disabled
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: drivers-${{ matrix.platform }}-${{ matrix.arch }}
          path: "go/build/libadbc_driver_snowflake.*"
          retention-days: 2

  package:
    name: "Generate Packages"
    runs-on: ubuntu-latest
    needs:
      - build
      - validate
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - name: "checkout remote"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name == 'workflow_dispatch'
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: true
          check-latest: true
          go-version: "stable"

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.63.2
          run-install: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: "drivers-*"
          path: "~/drivers"

      - name: Install tools
        working-directory: go
        run: |
          # XXX: Google has effectively abandoned go-licenses, and it broke
          # XXX: can't install go-licenses under go 1.25
          # Use our fork instead
          # https://github.com/google/go-licenses/issues/312
          go install github.com/lidavidm/go-licenses@master

      - name: Generate packages
        working-directory: go
        run: |
          pixi install

          pixi run adbc-gen-package \
            --name snowflake \
            --root $(pwd) \
            --manifest-template $(pwd)/manifest.toml \
             \
            -o ~/packages \
            ~/drivers/drivers-*-*/

          ls ~/packages

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: all-packages
          path: ~/packages
          retention-days: 7

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: "validation-report-*"
          path: "~/validation-report"

      - name: Generate combined docs
        working-directory: go
        run: |
          ls -laR ~/validation-report
          find ~/validation-report -type f -name '*.xml'
          cp $(find ~/validation-report -type f -name '*.xml') .
          ls *.xml
          pixi run gendocs --output generated

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: docs
          path: "go/generated/snowflake.md"
          retention-days: 2

  test-packages:
    name: "Test Packages/${{ matrix.platform }}_${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs:
      - package
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
          - { platform: macos, arch: arm64, runner: macos-latest }
          - { platform: windows, arch: amd64, runner: windows-latest }
    steps:
      # for now, install dbc from main
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          cache: true
          go-version: 'stable'
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.63.2
          run-install: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "all-packages"
          path: "~/packages"
      - name: install package
        # dbc uses the filename as the driver name
        run: |
          echo "Installing dbc"
          git clone --depth 1 https://github.com/columnar-tech/dbc
          cd dbc
          go build ./cmd/dbc
          echo "Installed dbc"
          ls -laR ~/packages
          driver_pkg=$(find ~/packages -name '*_${{ matrix.platform }}_${{ matrix.arch }}_*.tar.gz')
          echo "Installing ${driver_pkg}"
          ./dbc install --no-verify "${driver_pkg}"
          echo "Installed ${driver_pkg}"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: 'recursive'
      - name: "checkout remote"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name == 'workflow_dispatch'
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 1
          persist-credentials: false
          submodules: 'recursive'
      - name: load package
        working-directory: go
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            echo "Loading pre-build"
            ./ci/scripts/pre-build.sh test ${{ matrix.platform }} ${{ matrix.arch }}
          fi
          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          if [[ -f .env.ci ]]; then
            source .env.ci
          fi
          set +a
          pixi exec -s adbc-driver-manager -s pyarrow -s pytest python -m pytest -vs ci/test_package.py

  release:
    name: "Release (Dry Run)"
    runs-on: ubuntu-latest
    needs:
      - package
      - test-packages
      - validate
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - name: "checkout remote"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        if: github.event_name == 'workflow_dispatch'
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.63.2
          run-install: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "all-packages"
          path: "~/packages"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "docs"
          path: "~/packages"

      - name: Release (dry-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: go
        run: |
          git tag go/v1000.0.0
          tag=go/v1000.0.0

          pixi run release --dry-run $(pwd) $tag
          echo gh release upload $tag $(find ~/packages -name '*.tar.gz') $(find ~/packages -name 'manifest.yaml') $(find ~/packages -name '*.md')
