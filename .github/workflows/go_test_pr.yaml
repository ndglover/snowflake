# !!!! AUTO-GENERATED FILE.  DO NOT EDIT. !!!!
# USE adbc-gen-workflow (see adbc-drivers/dev) TO UPDATE THIS FILE.

# This is a common workflow for testing a PR when permissions are needed.

name: Go Test PR

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "The ID of the PR to test (e.g. 42)"
        required: true
        type: string
      ref:
        description: "The commit/ref to checkout"
        required: true
        type: string

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ inputs.pr }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: read
  pull-requests: read

jobs:
  setup:
    name: configure job
    runs-on: ubuntu-slim
    outputs:
      repository: ${{ steps.get_repo.outputs.repository }}
    steps:
      - name: get repository
        id: get_repo
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ inputs.pr }}
        run: |
          echo repository=$(gh pr --repo ${{ github.repository }} view "${PR}" --json headRepository,headRepositoryOwner --jq '"\(.headRepositoryOwner.login)/\(.headRepository.name)"') | tee -a $GITHUB_OUTPUT

      - name: set job summary
        env:
          PR: ${{ inputs.pr }}
          REF: ${{ inputs.ref }}
          REPOSITORY: ${{ steps.get_repo.outputs.repository }}
        run: |
          echo "**PR:** https://github.com/${{ github.repository }}/pull/${PR}" >> $GITHUB_STEP_SUMMARY
          echo "**Remote:** ${REPOSITORY}@${REF}" >> $GITHUB_STEP_SUMMARY

  test:
    uses: adbc-drivers/snowflake/.github/workflows/go_test.yaml@main # zizmor: ignore[unpinned-uses]
    needs:
      - setup
    with:
      repository: ${{ needs.setup.outputs.repository }}
      ref: ${{ inputs.ref }}
    secrets:
      # https://github.com/orgs/community/discussions/25238#discussioncomment-3247035
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_URI: ${{ secrets.SNOWFLAKE_URI }}
      SNOWFLAKE_SCHEMA_SECONDARY: ${{ secrets.SNOWFLAKE_SCHEMA_SECONDARY }}
      SNOWFLAKE_DATABASE_SECONDARY: ${{ secrets.SNOWFLAKE_DATABASE_SECONDARY }}
      SNOWFLAKE_DATABASE_SECONDARY_SCHEMA: ${{ secrets.SNOWFLAKE_DATABASE_SECONDARY_SCHEMA }}

  report:
    name: comment on PR
    runs-on: ubuntu-slim
    if: ${{ always() }}
    needs:
      - setup
      - test
    permissions:
      actions: read
      pull-requests: write
    env:
      TEST_RESULT: ${{ needs.test.result }}
    steps:
      - id: get_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo workflow_run_url=$(gh run --repo ${{ github.repository }} view ${{ github.run_id }} --json url --jq '.url') | tee -a $GITHUB_OUTPUT
          if [[ "$TEST_RESULT" == 'success' ]]; then
            echo message=":heavy_check_mark: **Test passed:** " | tee -a $GITHUB_OUTPUT
          else
            echo message=":x: **Test failed:** " | tee -a $GITHUB_OUTPUT
          fi

      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          INPUTS: ${{ toJSON(inputs) }}
          MESSAGE: ${{ steps.get_run.outputs.message }}
          REPOSITORY: ${{ needs.setup.outputs.repository }}
          WORKFLOW_RUN_URL: ${{ needs.setup.outputs.workflow_run_url }}
        with:
          github-token: ${{ github.token }}
          script: |
            const inputs = JSON.parse(process.env.INPUTS);
            const message = process.env.MESSAGE;
            const repository = process.env.REPOSITORY;
            const workflow_run_url = process.env.WORKFLOW_RUN_URL;
            github.rest.issues.createComment({
              issue_number: inputs["pr"],
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${message} ${repository}@${inputs["ref"]}\nWorkflow run: ${workflow_run_url}`
            })
